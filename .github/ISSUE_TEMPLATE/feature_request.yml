name: Feature request
description: Suggest an idea or improvement.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please keep requests within the project's
        scope: on-device UI automation for the owner's own devices. Requests
        aimed at detection-evasion, proxy/SIM rotation, or multi-account farm
        orchestration are out of scope and will be closed.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What's the use case?
      placeholder: I want the agent to be able to ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
    validations:
      required: false
