  <!-- mcp pill -->
  <g transform="translate(1010,478)">
    <rect x="0" y="0" width="174" height="44" rx="22" fill="none" stroke="#3DDC84" stroke-opacity="0.5"/>
    <text x="87" y="29" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
