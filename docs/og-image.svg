    <g fill="none" stroke="#0B1F17" stroke-linecap="round" transform="translate(5,5) scale(1.56)">
      <path d="M30 36a18 18 0 0 1 30.5 0" stroke-width="4" opacity="0.30"/>
      <path d="M24 30a26 26 0 0 1 41.5 0" stroke-width="4" opacity="0.16"/>
    </g>
    <path transform="translate(5,5) scale(1.56)" d="M44 36 L44 70 L51 62.5 L57 75 L63 72 L57 60 L66 60 Z"
          fill="#0B1F17" stroke="#0B1F17" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- title -->
  <text x="300" y="225" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="76" font-weight="700" letter-spacing="-1" fill="#E8FBF1">androir<tspan fill="#3DDC84">-mcp</tspan></text>

  <!-- tagline -->
  <text x="300" y="288" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
